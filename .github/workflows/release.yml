name: Release (native binaries)

# Builds the native AOT TitanVault library for every supported platform on its own runner
# (Native AOT cannot cross-compile across OSes), then creates a GitHub Release with all the
# binaries attached. Publishing that Release triggers publish-nuget.yml, which pushes the
# managed packages to nuget.org — so one tag ships both the native libs (here) and the
# managed packages (nuget.org).
#
# Trigger: push a tag like v1.0.1, or run manually (workflow_dispatch).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Cost guard: cancel any superseded run for the same ref instead of letting both bill.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    # Hard kill: no single platform build may run longer than this (default GitHub cap is 360).
    timeout-minutes: 30
    strategy:
      fail-fast: false   # one platform failing must not waste the others (each is bounded above)
      matrix:
        include:
          - { rid: win-x64,     os: windows-latest }
          - { rid: win-arm64,   os: windows-11-arm }    # arm64 host image ships the ARM64 C++ tools
          - { rid: linux-x64,   os: ubuntu-latest }
          - { rid: linux-arm64, os: ubuntu-24.04-arm }
          # Both macOS arches build on an Apple-Silicon runner: osx-arm64 native, osx-x64
          # cross-compiled (the macOS clang toolchain is universal). This avoids waiting for scarce
          # Intel (macos-13) runners, which could leave the job queued for hours.
          - { rid: osx-x64,     os: macos-latest }
          - { rid: osx-arm64,   os: macos-latest }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install native toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Build native AOT (PowerShell)
        if: runner.os == 'Windows'
        shell: pwsh
        timeout-minutes: 20   # the AOT compile is the only step that could hang; bound it tighter
        run: ./BuildScripts/build.ps1 -Task aot -Platforms ${{ matrix.rid }}

      - name: Build native AOT (Bash)
        if: runner.os != 'Windows'
        timeout-minutes: 20
        run: ./BuildScripts/build.sh --task aot --platforms ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TitanVault-${{ matrix.rid }}
          path: Dist/Native/${{ matrix.rid }}/
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: native
    # Only publish a Release for tag pushes; a manual workflow_dispatch runs the platform builds only
    # (useful for verifying e.g. the macOS cross-compile without cutting a release).
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write   # required to create the Release and upload assets
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: natives   # natives/TitanVault-<rid>/...

      - name: Pack managed packages (attached to the release for convenience)
        run: |
          for proj in UvfLib.Core UvfLib.Vault UvfLib.Master; do
            dotnet pack "Uvf.Net/$proj/$proj.csproj" -c Release \
              -p:PublishAot=false -p:NativeLib= -p:SelfContained=false -p:RuntimeIdentifier= -p:EnableDynamicLoading=false \
              -o packages
          done

      - name: Zip natives + checksums
        run: |
          mkdir -p dist
          for d in natives/TitanVault-*; do
            name=$(basename "$d")
            (cd "$d" && zip -r "$GITHUB_WORKSPACE/dist/${name}.zip" .)
          done
          cp packages/*.nupkg dist/
          (cd dist && sha256sum * > SHA256SUMS)
          ls -la dist

      - name: Create Release with all assets
        uses: softprops/action-gh-release@v2
        with:
          # Publishing this (non-draft) Release fires publish-nuget.yml -> nuget.org push.
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.zip
            dist/*.nupkg
            dist/SHA256SUMS
